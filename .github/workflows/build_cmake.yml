name: Build plugin

on: [push]

env:
  PLUGIN_NAME: StickyScroll
  QT_VERSION: 6.11.1
  QT_CREATOR_VERSION: 20.0.0
  MACOS_DEPLOYMENT_TARGET: "11.0"
  CMAKE_VERSION: "3.29.6"
  NINJA_VERSION: "1.12.1"

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    outputs:
        tag: ${{ steps.git.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "Windows Latest MSVC", artifact: "Windows-x64",
            os: windows-2022,
            platform: windows_x64,
            cc: "cl", cxx: "cl",
            environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat",
          }
        - {
            name: "Windows Latest MSVC Arm64", artifact: "Windows-arm64",
            os: windows-11-arm,
            platform: windows_arm64,
            cc: "cl", cxx: "cl",
            environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvarsarm64.bat",
          }
        - {
            name: "Ubuntu Latest GCC", artifact: "Linux-x64",
            os: ubuntu-latest,
            platform: linux_x64,
            cc: "gcc", cxx: "g++"
          }
        - {
            name: "Ubuntu Latest GCC Arm64", artifact: "Linux-arm64",
            os: ubuntu-24.04-arm,
            platform: linux_arm64,
            cc: "gcc", cxx: "g++"
          }
        - {
            name: "macOS Latest Clang", artifact: "macOS-universal",
            os: macos-latest,
            platform: mac_x64,
            cc: "clang", cxx: "clang++"
          }

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Checkout submodules
      id: git
      shell: cmake -P {0}
      run: |
        if (${{github.ref}} MATCHES "tags/v(.*)")
            file(APPEND "$ENV{GITHUB_OUTPUT}" "tag=${CMAKE_MATCH_1}")
        else()
            file(APPEND "$ENV{GITHUB_OUTPUT}" "tag=${{github.run_id}}")
        endif()

    - name: Download Ninja and CMake
      uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}
        ninjaVersion: ${{ env.NINJA_VERSION }}

    - name: Install system libs
      shell: cmake -P {0}
      run: |
        if ("${{ matrix.config.platform }}" MATCHES "linux")
          execute_process(
            COMMAND sudo apt-get update
          )
          execute_process(
            COMMAND sudo apt-get install -y libgl1-mesa-dev
            RESULT_VARIABLE result
          )
          if (NOT result EQUAL 0)
            message(FATAL_ERROR "Failed to install dependencies")
          endif()
        endif()

    - name: Download Qt
      id: qt
      shell: cmake -P {0}
      run: |
        set(qt_version "$ENV{QT_VERSION}")

        function(download_qt platform export_qt_dir)
          string(REPLACE "." "" qt_version_dotless "${qt_version}")
          # Inner repository folder. Same as the outer one on Linux/macOS, but the
          # Windows x64 repo is split per compiler (qt6_<ver>_msvc2022_64) since Qt 6.11.
          set(qt_repo_dir "qt6_${qt_version_dotless}")
          if (platform STREQUAL "windows_x64")
            set(url_os "windows_x86")
            set(compiler_id "win64_msvc2022_64")
            if (qt_version VERSION_GREATER_EQUAL "6.11.0")
              set(qt_repo_dir "qt6_${qt_version_dotless}_msvc2022_64")
            endif()
          elseif (platform STREQUAL "windows_arm64")
            set(url_os "windows_arm64")
            set(compiler_id "win64_msvc2022_arm64")
          elseif (platform STREQUAL "linux_x64")
            set(url_os "linux_x64")
            set(compiler_id "linux_gcc_64")
          elseif (platform STREQUAL "linux_arm64")
            set(url_os "linux_arm64")
            set(compiler_id "linux_gcc_arm64")
          elseif (platform STREQUAL "mac_x64")
            set(url_os "mac_x64")
            set(compiler_id "clang_64")
          endif()

          set(qt_base_url "https://download.qt.io/online/qtsdkrepository/${url_os}/desktop/qt6_${qt_version_dotless}/${qt_repo_dir}")
          file(DOWNLOAD "${qt_base_url}/Updates.xml" ./Updates.xml SHOW_PROGRESS)

          file(READ ./Updates.xml updates_xml)
          # The XML is turned into a CMake list (";"-separated) below. Qt's Updates.xml
          # contains literal ";" characters (from "&lt;br>" HTML entities in package
          # <Description>s), which would fragment the <PackageUpdate> sections and make
          # some modules (e.g. qtbase, qtdeclarative) impossible to find. Neutralize them.
          string(REPLACE ";" " " updates_xml "${updates_xml}")
          # get the package sections, only for given compiler, without the "debug info" ones
          string(REGEX REPLACE "<PackageUpdate>" ";<PackageUpdate>" sections "${updates_xml}")
          list(FILTER sections EXCLUDE REGEX "<Name>.*debug.*</Name>")
          list(FILTER sections INCLUDE REGEX "<Name>.*${compiler_id}.*</Name>")

          # Save the path for other steps
          file(TO_CMAKE_PATH "$ENV{GITHUB_WORKSPACE}/qt/${platform}" qt_dir)
          if (export_qt_dir)
            file(APPEND "$ENV{GITHUB_OUTPUT}" "qt_dir=${qt_dir}")
          endif()

          function(get_sub_url outvar module)
            set(filtered ${sections})
            list(FILTER filtered INCLUDE REGEX "<DownloadableArchives>.*${module}.*</DownloadableArchives>")
            list(LENGTH filtered count)
            if (count LESS 1)
              set(${outvar} "<notfound>" PARENT_SCOPE)
              return()
            endif()
            list(GET filtered 0 section)
            string(REGEX MATCH "<Name>(.*)</Name>" match "${section}")
            set(name ${CMAKE_MATCH_1})
            string(REGEX MATCH "<Version>(.*)</Version>" match "${section}")
            set(version ${CMAKE_MATCH_1})
            string(REGEX MATCH "<DownloadableArchives>.*(${module}[^,]+).*</DownloadableArchives>" match "${section}")
            set(archive ${CMAKE_MATCH_1})
            set(${outvar} "${name}/${version}${archive}" PARENT_SCOPE)
          endfunction()

          message("Downloading Qt to ${qt_dir}")
          function(downloadAndExtract module subdir)
            file(MAKE_DIRECTORY "${qt_dir}/${subdir}")
            set(archive "${module}.7z")
            get_sub_url(sub_url ${module})
            set(url "${qt_base_url}/${sub_url}")
            message("Downloading ${module} from ${url}")
            message("... extracting to ${qt_dir}/${subdir}")
            file(DOWNLOAD "${url}" "$ENV{GITHUB_WORKSPACE}/${archive}" SHOW_PROGRESS)
            execute_process(COMMAND ${CMAKE_COMMAND} -E tar xvf "$ENV{GITHUB_WORKSPACE}/${archive}" WORKING_DIRECTORY "${qt_dir}/${subdir}")
          endfunction()

          # qttools provides LinguistTools (lupdate/lrelease), required by this plugin.
          set(packages qtbase qtdeclarative qttools qtsvg qt5compat qtshadertools)
          # TaskTree became a standalone module in Qt 6.11; Qt Creator links against it.
          if (qt_version VERSION_GREATER_EQUAL "6.11.0")
            list(APPEND packages qttasktree)
          endif()
          foreach(package ${packages})
            downloadAndExtract(${package} "")
          endforeach()

          # uic depends on libicu*.so
          if ("${{ runner.os }}" STREQUAL "Linux")
            downloadAndExtract("icu" "lib")
          endif()

          execute_process(COMMAND ${qt_dir}/bin/qmake -query)
        endfunction()

        if ("${{ matrix.config.platform }}" STREQUAL "windows_x64")
          download_qt(windows_x64 TRUE)
        elseif ("${{ matrix.config.platform }}" STREQUAL "windows_arm64")
          download_qt(windows_arm64 TRUE)
        elseif ("${{ matrix.config.platform }}" STREQUAL "linux_x64")
          download_qt(linux_x64 TRUE)
        elseif ("${{ matrix.config.platform }}" STREQUAL "linux_arm64")
          download_qt(linux_arm64 TRUE)
        elseif ("${{ runner.os }}" STREQUAL "macOS")
          download_qt(mac_x64 TRUE)
        endif()

    - name: Download Qt Creator
      id: qt_creator
      uses: qt-creator/install-dev-package@ca70993b6cc9cdcaa77689d527f54e35daa4ae7a # v2.3
      with:
        version: ${{ env.QT_CREATOR_VERSION }}
        unzip-to: 'qtcreator'
        platform: ${{ matrix.config.platform }}

    - name: Build
      shell: cmake -P {0}
      run: |
        set(ENV{CC} ${{ matrix.config.cc }})
        set(ENV{CXX} ${{ matrix.config.cxx }})
        set(ENV{MACOSX_DEPLOYMENT_TARGET} "${{ env.MACOS_DEPLOYMENT_TARGET }}")

        if ("${{ runner.os }}" STREQUAL "Windows" AND NOT "x${{ matrix.config.environment_script }}" STREQUAL "x")
          execute_process(
            COMMAND "${{ matrix.config.environment_script }}" && set
            OUTPUT_FILE environment_script_output.txt
          )
          file(STRINGS environment_script_output.txt output_lines)
          foreach(line IN LISTS output_lines)
            if (line MATCHES "^([a-zA-Z0-9_-]+)=(.*)$")
              set(ENV{${CMAKE_MATCH_1}} "${CMAKE_MATCH_2}")
            endif()
          endforeach()
        endif()

        set(ENV{NINJA_STATUS} "[%f/%t %o/sec] ")
        if ("${{ runner.os }}" STREQUAL "macOS")
            set(ENV{CMAKE_OSX_ARCHITECTURES} "x86_64;arm64")
        endif()

        # Locate build_plugin.py. Its location depends on the dev-package layout:
        # "share/qtcreator/scripts" on Linux/Windows, but nested under a
        # "Qt Creator.sdk/" subfolder on macOS. Search recursively so any layout works.
        file(GLOB_RECURSE build_plugin_py_candidates
             "${{ steps.qt_creator.outputs.path }}/build_plugin.py")
        # Prefer the copy in the dev package's scripts dir (common.py sits next to it);
        # a copy inside the .app bundle may lack the helper modules it imports.
        set(build_plugin_py "")
        foreach(candidate ${build_plugin_py_candidates})
          if (candidate MATCHES "share/qtcreator/scripts/build_plugin.py")
            set(build_plugin_py "${candidate}")
            break()
          endif()
        endforeach()
        if (NOT build_plugin_py AND build_plugin_py_candidates)
          list(GET build_plugin_py_candidates 0 build_plugin_py)
        endif()
        if (NOT build_plugin_py)
          message(FATAL_ERROR "Could not find build_plugin.py under '${{ steps.qt_creator.outputs.path }}'")
        endif()
        message(STATUS "Using build script: ${build_plugin_py}")

        execute_process(
          COMMAND python
            -u
            "${build_plugin_py}"
            --name "$ENV{PLUGIN_NAME}-${{ steps.git.outputs.tag }}-QtC$ENV{QT_CREATOR_VERSION}-${{ matrix.config.artifact }}"
            --src .
            --build build
            --qt-path "${{ steps.qt.outputs.qt_dir }}"
            --qtc-path "${{ steps.qt_creator.outputs.path }}"
            --output-path "$ENV{GITHUB_WORKSPACE}"
            ${additional_config}
          RESULT_VARIABLE result
        )
        if (NOT result EQUAL 0)
          string(REGEX MATCH "FAILED:.*$" error_message "${output}")
          string(REPLACE "\n" "%0A" error_message "${error_message}")
          message("::error::${error_message}")
          message(FATAL_ERROR "Build failed")
        endif()

    - name: Upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        path: ./${{ env.PLUGIN_NAME }}-${{ steps.git.outputs.tag }}-QtC${{ env.QT_CREATOR_VERSION }}-${{ matrix.config.artifact }}.7z
        name: ${{ env.PLUGIN_NAME}}-${{ steps.git.outputs.tag }}-QtC${{ env.QT_CREATOR_VERSION }}-${{ matrix.config.artifact }}.7z

    # The json is the same for all platforms, but we need to save one
    - name: Upload plugin json
      if: matrix.config.platform == 'linux_x64'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ env.PLUGIN_NAME }}.json
        path: ./build/build/${{ env.PLUGIN_NAME }}.json


  release:
    if: contains(github.ref, 'tags/v')
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        path: release-with-dirs

    - name: Fixup artifacts
      run: |
        mkdir release
        mv release-with-dirs/*/* release/

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.build.outputs.tag }}
        files: |
          release/${{ env.PLUGIN_NAME}}-${{ needs.build.outputs.tag }}-QtC${{ env.QT_CREATOR_VERSION }}-Linux-arm64.7z
          release/${{ env.PLUGIN_NAME}}-${{ needs.build.outputs.tag }}-QtC${{ env.QT_CREATOR_VERSION }}-Linux-x64.7z
          release/${{ env.PLUGIN_NAME}}-${{ needs.build.outputs.tag }}-QtC${{ env.QT_CREATOR_VERSION }}-macOS-universal.7z
          release/${{ env.PLUGIN_NAME}}-${{ needs.build.outputs.tag }}-QtC${{ env.QT_CREATOR_VERSION }}-Windows-arm64.7z
          release/${{ env.PLUGIN_NAME}}-${{ needs.build.outputs.tag }}-QtC${{ env.QT_CREATOR_VERSION }}-Windows-x64.7z
        draft: false
        prerelease: false
